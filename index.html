<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가계부</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:  #0d0d0d;
      --white:  #f5f2eb;
      --red:    #e63329;
      --blue:   #1b4fad;
      --yellow: #f5c800;
      --gray:   #c8c3b8;
      --gray2:  #8a8680;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', 'Noto Sans KR', sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--black);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: stretch;
      border-bottom: 4px solid var(--red);
    }

    .header-left {
      padding: 20px 28px;
      border-right: 4px solid var(--red);
    }

    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.6rem;
      letter-spacing: 0.12em;
      color: var(--white);
      line-height: 1;
    }

    .header-title span {
      display: block;
      font-family: 'Barlow', sans-serif;
      font-size: 0.58rem;
      font-weight: 300;
      letter-spacing: 0.4em;
      color: var(--gray);
      margin-top: 4px;
      text-transform: uppercase;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .month-nav button {
      width: 52px;
      height: 100%;
      border: none;
      background: var(--black);
      color: var(--yellow);
      font-size: 1.4rem;
      cursor: pointer;
      border-left: 2px solid #222;
      transition: background 0.15s;
    }

    .month-nav button:hover { background: #1a1a1a; }

    .month-nav span {
      padding: 0 20px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.15em;
      color: var(--white);
      min-width: 110px;
      text-align: center;
      border-left: 2px solid #222;
    }

    /* ── Summary ── */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 4px solid var(--black);
    }

    .card {
      padding: 24px 20px;
      border-right: 4px solid var(--black);
      position: relative;
      overflow: hidden;
    }

    .card:last-child { border-right: none; }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 5px;
    }

    .card.income::before  { background: var(--blue); }
    .card.expense::before { background: var(--red); }
    .card.balance::before { background: var(--yellow); }

    .card .geo {
      position: absolute;
      bottom: -10px; right: -10px;
      opacity: 0.06;
      font-size: 5rem;
      font-family: 'Bebas Neue', sans-serif;
      line-height: 1;
      color: var(--black);
    }

    .card .label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gray2);
      margin-bottom: 8px;
    }

    .card .amount {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 0.05em;
    }

    .card.income  .amount { color: var(--blue); }
    .card.expense .amount { color: var(--red); }
    .card.balance .amount { color: var(--black); }

    /* ── Add Form ── */
    .add-form {
      display: flex;
      gap: 0;
      flex-wrap: wrap;
      border-bottom: 4px solid var(--black);
      background: var(--white);
    }

    .type-toggle {
      display: flex;
      border-right: 4px solid var(--black);
    }

    .type-toggle button {
      padding: 14px 20px;
      border: none;
      background: var(--white);
      color: var(--gray2);
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: 'Barlow', sans-serif;
      border-right: 2px solid var(--gray);
      transition: background 0.15s, color 0.15s;
    }

    .type-toggle button:last-child { border-right: none; }
    .type-toggle button.active-income  { background: var(--blue);   color: var(--white); }
    .type-toggle button.active-expense { background: var(--red);    color: var(--white); }

    .bau-input {
      padding: 14px 16px;
      border: none;
      border-right: 2px solid var(--gray);
      font-size: 0.85rem;
      font-weight: 400;
      background: var(--white);
      color: var(--black);
      outline: none;
      font-family: 'Barlow', 'Noto Sans KR', sans-serif;
      transition: background 0.15s;
    }

    .bau-input:focus { background: #ede9e0; }
    .bau-input::placeholder { color: var(--gray); }
    .bau-input[name=desc]   { flex: 2;   min-width: 130px; }
    .bau-input[name=amount] { flex: 1.5; min-width: 110px; }
    .bau-input[name=date]   { flex: 1.5; min-width: 140px; }
    select.bau-input        { flex: 1.5; min-width: 110px; cursor: pointer; }

    .add-btn {
      padding: 14px 24px;
      border: none;
      background: var(--yellow);
      color: var(--black);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      white-space: nowrap;
      border-left: 4px solid var(--black);
      transition: background 0.15s;
    }

    .add-btn:hover { background: #e0b800; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 4px solid var(--black);
    }

    .tabs button {
      flex: 1;
      padding: 13px 0;
      border: none;
      border-right: 2px solid var(--gray);
      background: var(--white);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray2);
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
      transition: background 0.15s, color 0.15s;
    }

    .tabs button:last-child { border-right: none; }

    .tabs button.active {
      background: var(--black);
      color: var(--yellow);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Ledger ── */
    .list-section { padding: 28px; }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.25em;
      color: var(--gray2);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--black);
    }

    .no-data {
      text-align: center;
      color: var(--gray2);
      padding: 48px 0;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .entry {
      display: flex;
      align-items: stretch;
      border: 2px solid var(--black);
      margin-bottom: -2px;
      transition: background 0.12s;
    }

    .entry:hover { background: #ede9e0; }

    .entry .date-badge {
      width: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--white);
      flex-shrink: 0;
      background: var(--black);
      border-right: 2px solid var(--black);
    }

    .entry .cat-badge {
      padding: 12px 12px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray2);
      flex-shrink: 0;
      white-space: nowrap;
      border-right: 2px solid var(--gray);
      display: flex;
      align-items: center;
    }

    .entry .desc {
      flex: 1;
      padding: 12px 16px;
      font-size: 0.88rem;
      font-weight: 400;
      color: var(--black);
      display: flex;
      align-items: center;
    }

    .entry .amount {
      padding: 12px 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      border-left: 2px solid var(--gray);
    }

    .entry .amount.income  { color: var(--blue); }
    .entry .amount.expense { color: var(--red); }

    .entry .del-btn {
      background: none;
      border: none;
      border-left: 2px solid var(--gray);
      cursor: pointer;
      color: var(--gray);
      font-size: 0.75rem;
      padding: 0 12px;
      font-weight: 700;
      transition: background 0.12s, color 0.12s;
    }

    .entry .del-btn:hover { background: var(--red); color: var(--white); }

    /* ── Stat ── */
    .stat-section { padding: 28px; }

    .stat-block {
      border: 2px solid var(--black);
      margin-bottom: 24px;
    }

    .stat-block-header {
      background: var(--black);
      color: var(--yellow);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.3em;
      padding: 10px 16px;
    }

    .stat-block-body { padding: 20px; }

    /* 차트 */
    .chart-legend {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gray2);
    }

    .legend-dot {
      display: inline-block;
      width: 10px; height: 10px;
      margin-right: 5px;
    }

    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }

    .bar-label {
      width: 52px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem;
      color: var(--gray2);
      text-align: right;
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }

    .bar-wrap {
      flex: 1;
      background: var(--gray);
      height: 10px;
      overflow: hidden;
    }

    .bar-fill { height: 100%; transition: width 0.5s ease; }
    .bar-fill.income  { background: var(--blue); }
    .bar-fill.expense { background: var(--red); }

    .bar-val {
      width: 100px;
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--gray2);
      text-align: right;
      flex-shrink: 0;
    }

    /* 표 */
    .stat-table { width: 100%; border-collapse: collapse; }

    .stat-table th {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gray2);
      padding: 8px 10px;
      text-align: left;
      border-bottom: 2px solid var(--black);
    }

    .stat-table td {
      padding: 10px;
      font-size: 0.83rem;
      color: var(--black);
      border-bottom: 1px solid var(--gray);
    }

    .stat-table tr:last-child td { border-bottom: none; }
    .stat-table .num { text-align: right; font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 0.05em; }
    .stat-table .income-txt  { color: var(--blue); }
    .stat-table .expense-txt { color: var(--red); }
    .stat-table .balance-txt { color: var(--black); font-weight: 700; }

    /* 카테고리 */
    .cat-stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .cat-stat-label { width: 48px; font-size: 0.72rem; font-weight: 700; color: var(--black); text-transform: uppercase; letter-spacing: 0.08em; flex-shrink: 0; }
    .cat-bar-wrap { flex: 1; background: var(--gray); height: 8px; overflow: hidden; }
    .cat-bar-fill { height: 100%; background: var(--red); }
    .cat-stat-val { width: 80px; font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; color: var(--red); text-align: right; flex-shrink: 0; }
    .cat-stat-pct { width: 34px; font-size: 0.68rem; font-weight: 700; color: var(--gray2); text-align: right; flex-shrink: 0; }

    /* 장식 도형 */
    .bau-deco {
      display: flex;
      gap: 0;
      height: 8px;
      border-bottom: 4px solid var(--black);
    }
    .bau-deco .s1 { flex: 3; background: var(--red); }
    .bau-deco .s2 { flex: 1; background: var(--yellow); }
    .bau-deco .s3 { flex: 2; background: var(--blue); }
    .bau-deco .s4 { flex: 1; background: var(--black); }
  </style>
</head>
<body>

<div class="bau-deco"><div class="s1"></div><div class="s2"></div><div class="s3"></div><div class="s4"></div></div>

<header>
  <div class="header-left">
    <div class="header-title">
      가계부
      <span>Household Budget · Bauhaus 1919</span>
    </div>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <span id="month-label"></span>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>
</header>

<div class="summary">
  <div class="card income">
    <div class="label">수입 / Income</div>
    <div class="amount" id="total-income">0원</div>
    <div class="geo">▲</div>
  </div>
  <div class="card expense">
    <div class="label">지출 / Expense</div>
    <div class="amount" id="total-expense">0원</div>
    <div class="geo">●</div>
  </div>
  <div class="card balance">
    <div class="label">잔액 / Balance</div>
    <div class="amount" id="total-balance">0원</div>
    <div class="geo">■</div>
  </div>
</div>

<div class="add-form">
  <div class="type-toggle">
    <button id="btn-income" class="active-income" onclick="setType('income')">수입</button>
    <button id="btn-expense" onclick="setType('expense')">지출</button>
  </div>
  <input type="date" name="date" id="input-date" class="bau-input">
  <input type="text" name="desc" id="input-desc" placeholder="내용" class="bau-input">
  <select id="input-cat" class="bau-input"></select>
  <input type="number" name="amount" id="input-amount" placeholder="금액" min="0" class="bau-input">
  <button class="add-btn" onclick="addEntry()">+ 추가</button>
</div>

<div class="tabs">
  <button class="active" onclick="switchTab('ledger', this)">내역</button>
  <button onclick="switchTab('daily', this)">일별 통계</button>
  <button onclick="switchTab('monthly', this)">월별 통계</button>
</div>

<!-- 내역 -->
<div id="tab-ledger" class="tab-panel active">
  <div class="list-section">
    <div class="section-title" id="list-title"></div>
    <div id="entry-list"></div>
  </div>
</div>

<!-- 일별 통계 -->
<div id="tab-daily" class="tab-panel">
  <div class="stat-section">
    <div class="stat-block">
      <div class="stat-block-header" id="daily-title">일별 수입 · 지출</div>
      <div class="stat-block-body">
        <div class="chart-legend">
          <span><span class="legend-dot" style="background:var(--blue)"></span>수입</span>
          <span><span class="legend-dot" style="background:var(--red)"></span>지출</span>
        </div>
        <div id="daily-chart"></div>
      </div>
    </div>

    <div class="stat-block">
      <div class="stat-block-header">일별 내역</div>
      <div class="stat-block-body" style="padding:0">
        <table class="stat-table">
          <thead><tr><th>날짜</th><th class="num">수입</th><th class="num">지출</th><th class="num">잔액</th></tr></thead>
          <tbody id="daily-tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="stat-block">
      <div class="stat-block-header">지출 카테고리</div>
      <div class="stat-block-body"><div id="cat-chart"></div></div>
    </div>
  </div>
</div>

<!-- 월별 통계 -->
<div id="tab-monthly" class="tab-panel">
  <div class="stat-section">
    <div class="stat-block">
      <div class="stat-block-header">최근 12개월</div>
      <div class="stat-block-body">
        <div class="chart-legend">
          <span><span class="legend-dot" style="background:var(--blue)"></span>수입</span>
          <span><span class="legend-dot" style="background:var(--red)"></span>지출</span>
        </div>
        <div id="monthly-chart"></div>
      </div>
    </div>

    <div class="stat-block">
      <div class="stat-block-header">월별 내역</div>
      <div class="stat-block-body" style="padding:0">
        <table class="stat-table">
          <thead><tr><th>월</th><th class="num">수입</th><th class="num">지출</th><th class="num">잔액</th></tr></thead>
          <tbody id="monthly-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  let currentYear = new Date().getFullYear();
  let currentMonth = new Date().getMonth() + 1;
  let currentType = 'income';
  let currentTab = 'ledger';
  let entries = JSON.parse(localStorage.getItem('kakeibo') || '[]');

  const incomeCategories  = ['급여', '용돈', '기타'];
  const expenseCategories = ['식비', '교통', '쇼핑', '의료', '문화', '기타'];

  function setType(type) {
    currentType = type;
    document.getElementById('btn-income').className  = type === 'income'  ? 'active-income'  : '';
    document.getElementById('btn-expense').className = type === 'expense' ? 'active-expense' : '';
    const cats = type === 'income' ? incomeCategories : expenseCategories;
    document.getElementById('input-cat').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
  }

  function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    btn.classList.add('active');
    render();
  }

  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
    render();
  }

  function fmt(n) { return n.toLocaleString('ko-KR') + '원'; }
  function pad(n) { return String(n).padStart(2, '0'); }

  function addEntry() {
    const date   = document.getElementById('input-date').value;
    const desc   = document.getElementById('input-desc').value.trim();
    const cat    = document.getElementById('input-cat').value;
    const amount = parseInt(document.getElementById('input-amount').value);
    if (!date || !desc || !amount || amount <= 0) { alert('날짜, 내용, 금액을 모두 입력해주세요.'); return; }
    entries.push({ id: Date.now(), date, desc, cat, amount, type: currentType });
    localStorage.setItem('kakeibo', JSON.stringify(entries));
    document.getElementById('input-desc').value = '';
    document.getElementById('input-amount').value = '';
    render();
  }

  function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    localStorage.setItem('kakeibo', JSON.stringify(entries));
    render();
  }

  function getMonthly(y, m) { return entries.filter(e => e.date.startsWith(`${y}-${pad(m)}`)); }
  function sumType(arr, type) { return arr.filter(e => e.type === type).reduce((s, e) => s + e.amount, 0); }

  function renderSummary(monthly) {
    const income = sumType(monthly, 'income'), expense = sumType(monthly, 'expense');
    document.getElementById('total-income').textContent  = fmt(income);
    document.getElementById('total-expense').textContent = fmt(expense);
    document.getElementById('total-balance').textContent = fmt(income - expense);
  }

  function renderLedger(monthly) {
    document.getElementById('list-title').textContent = `${currentMonth}월 거래 내역`;
    const list = document.getElementById('entry-list');
    if (monthly.length === 0) { list.innerHTML = '<div class="no-data">이번 달 거래 내역이 없습니다</div>'; return; }
    const byDay = {};
    for (const e of monthly) { if (!byDay[e.date]) byDay[e.date] = []; byDay[e.date].push(e); }
    const days = Object.keys(byDay).sort((a, b) => b.localeCompare(a));
    list.innerHTML = days.map(day => {
      const dn = parseInt(day.split('-')[2]);
      return byDay[day].map(e => `
        <div class="entry">
          <div class="date-badge">${dn}</div>
          <div class="cat-badge">${e.cat}</div>
          <div class="desc">${e.desc}</div>
          <div class="amount ${e.type}">${e.type === 'income' ? '+' : '−'}${fmt(e.amount)}</div>
          <button class="del-btn" onclick="deleteEntry(${e.id})">✕</button>
        </div>`).join('');
    }).join('');
  }

  function renderDaily(monthly) {
    document.getElementById('daily-title').textContent = `${currentMonth}월 일별 수입 · 지출`;
    const byDay = {};
    for (const e of monthly) { if (!byDay[e.date]) byDay[e.date] = {income:0,expense:0}; byDay[e.date][e.type] += e.amount; }
    const days = Object.keys(byDay).sort();
    if (days.length === 0) {
      document.getElementById('daily-chart').innerHTML = '<div class="no-data">데이터가 없습니다</div>';
      document.getElementById('daily-tbody').innerHTML = '';
      document.getElementById('cat-chart').innerHTML = ''; return;
    }
    const maxVal = Math.max(...days.map(d => Math.max(byDay[d].income, byDay[d].expense)), 1);
    document.getElementById('daily-chart').innerHTML = days.map(day => {
      const dn = parseInt(day.split('-')[2]), d = byDay[day];
      return `<div class="bar-row">
        <div class="bar-label">${dn}일</div>
        <div style="flex:1;display:flex;flex-direction:column;gap:4px">
          <div class="bar-wrap"><div class="bar-fill income"  style="width:${Math.round(d.income/maxVal*100)}%"></div></div>
          <div class="bar-wrap"><div class="bar-fill expense" style="width:${Math.round(d.expense/maxVal*100)}%"></div></div>
        </div>
        <div class="bar-val" style="line-height:1.8">+${d.income.toLocaleString()}<br>−${d.expense.toLocaleString()}</div>
      </div>`;
    }).join('');
    let bal = 0;
    document.getElementById('daily-tbody').innerHTML = days.map(day => {
      const dn = parseInt(day.split('-')[2]), d = byDay[day]; bal += d.income - d.expense;
      return `<tr><td>${dn}일</td><td class="num income-txt">${d.income>0?'+'+fmt(d.income):'—'}</td><td class="num expense-txt">${d.expense>0?'−'+fmt(d.expense):'—'}</td><td class="num ${bal>=0?'balance-txt':'expense-txt'}">${fmt(bal)}</td></tr>`;
    }).join('');
    const catTotals = {};
    for (const e of monthly.filter(e => e.type==='expense')) catTotals[e.cat] = (catTotals[e.cat]||0)+e.amount;
    const totalExp = Object.values(catTotals).reduce((s,v)=>s+v,0);
    const cats = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
    document.getElementById('cat-chart').innerHTML = cats.length===0
      ? '<div class="no-data" style="padding:12px 0">지출 내역이 없습니다</div>'
      : cats.map(([cat,val])=>{
          const pct=totalExp>0?Math.round(val/totalExp*100):0;
          return `<div class="cat-stat-row"><div class="cat-stat-label">${cat}</div><div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${pct}%"></div></div><div class="cat-stat-val">−${fmt(val)}</div><div class="cat-stat-pct">${pct}%</div></div>`;
        }).join('');
  }

  function renderMonthly() {
    const months=[]; let y=currentYear, m=currentMonth;
    for(let i=0;i<12;i++){months.unshift({y,m});m--;if(m<1){m=12;y--;}}
    const data=months.map(({y,m})=>{
      const arr=getMonthly(y,m);
      return{label:`${String(y).slice(2)}/${pad(m)}`,income:sumType(arr,'income'),expense:sumType(arr,'expense')};
    });
    const maxVal=Math.max(...data.map(d=>Math.max(d.income,d.expense)),1);
    document.getElementById('monthly-chart').innerHTML=data.map(d=>`
      <div class="bar-row">
        <div class="bar-label" style="width:58px">${d.label}</div>
        <div style="flex:1;display:flex;flex-direction:column;gap:4px">
          <div class="bar-wrap"><div class="bar-fill income"  style="width:${Math.round(d.income/maxVal*100)}%"></div></div>
          <div class="bar-wrap"><div class="bar-fill expense" style="width:${Math.round(d.expense/maxVal*100)}%"></div></div>
        </div>
        <div class="bar-val" style="line-height:1.8">+${d.income.toLocaleString()}<br>−${d.expense.toLocaleString()}</div>
      </div>`).join('');
    document.getElementById('monthly-tbody').innerHTML=data.map(d=>{
      const bal=d.income-d.expense;
      return`<tr><td>${d.label}</td><td class="num income-txt">${d.income>0?'+'+fmt(d.income):'—'}</td><td class="num expense-txt">${d.expense>0?'−'+fmt(d.expense):'—'}</td><td class="num ${bal>=0?'balance-txt':'expense-txt'}">${fmt(bal)}</td></tr>`;
    }).join('');
  }

  function render() {
    document.getElementById('month-label').textContent = `${currentYear}.${pad(currentMonth)}`;
    const monthly = getMonthly(currentYear, currentMonth);
    monthly.sort((a,b)=>b.date.localeCompare(a.date));
    renderSummary(monthly);
    if      (currentTab==='ledger')  renderLedger(monthly);
    else if (currentTab==='daily')   renderDaily(monthly);
    else if (currentTab==='monthly') renderMonthly();
  }

  const today = new Date();
  document.getElementById('input-date').value = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  setType('income');
  render();
</script>
</body>
</html>
