<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가계부</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #e0e5ec;
      --text:         #4a5568;
      --text2:        #718096;
      --muted:        #a0aec0;
      --shadow-dark:  #a3b1c6;
      --shadow-light: #ffffff;
      --green-d:      #276749;
      --red-d:        #9b2c2c;
      --accent:       #667eea;
      --accent-d:     #434190;

      --neu-flat:    4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light);
      --neu-pressed: inset 3px 3px 7px var(--shadow-dark), inset -3px -3px 7px var(--shadow-light);
      --neu-raised:  6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 28px 28px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      font-family: 'Nunito', sans-serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--accent);
    }

    .header-title span {
      display: block;
      font-size: 0.6rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.22em;
      margin-top: 2px;
      text-transform: uppercase;
    }

    .month-nav { display: flex; align-items: center; gap: 14px; }

    .month-nav button {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--bg);
      color: var(--accent);
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: var(--neu-flat);
      transition: box-shadow 0.15s;
    }
    .month-nav button:active { box-shadow: var(--neu-pressed); }

    .month-nav span {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      min-width: 92px;
      text-align: center;
    }

    /* ── Summary ── */
    .summary {
      display: flex;
      gap: 14px;
      padding: 0 28px 24px;
    }

    .card {
      flex: 1;
      padding: 18px 10px;
      border-radius: 18px;
      text-align: center;
      background: var(--bg);
      box-shadow: var(--neu-raised);
    }

    .card .card-icon { font-size: 1.2rem; margin-bottom: 6px; }
    .card .label { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .card .amount { font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700; }
    .card.income  .amount { color: var(--green-d); }
    .card.expense .amount { color: var(--red-d); }
    .card.balance .amount { color: var(--accent-d); }

    /* ── Add Form ── */
    .add-form {
      margin: 0 28px 24px;
      padding: 22px 20px;
      border-radius: 20px;
      background: var(--bg);
      box-shadow: var(--neu-raised);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .type-toggle {
      display: flex;
      border-radius: 50px;
      background: var(--bg);
      box-shadow: var(--neu-pressed);
      padding: 4px;
      gap: 4px;
    }

    .type-toggle button {
      padding: 7px 16px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      border-radius: 50px;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.2s;
    }

    .type-toggle button.active-income  { background: var(--bg); color: var(--green-d); box-shadow: var(--neu-flat); }
    .type-toggle button.active-expense { background: var(--bg); color: var(--red-d);   box-shadow: var(--neu-flat); }

    .neu-input {
      padding: 9px 14px;
      border: none;
      border-radius: 10px;
      font-size: 0.83rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      font-family: 'Noto Sans KR', sans-serif;
      box-shadow: var(--neu-pressed);
      transition: box-shadow 0.2s;
    }
    .neu-input:focus { box-shadow: var(--neu-pressed), 0 0 0 2px rgba(102,126,234,0.3); }
    .neu-input::placeholder { color: var(--muted); }
    .neu-input[name=desc]   { flex: 2;   min-width: 120px; }
    .neu-input[name=amount] { flex: 1.5; min-width: 100px; }
    .neu-input[name=date]   { flex: 1.5; min-width: 130px; }
    select.neu-input        { flex: 1.5; min-width: 100px; cursor: pointer; }

    .add-btn {
      padding: 9px 22px;
      border: none;
      border-radius: 50px;
      background: var(--bg);
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      white-space: nowrap;
      box-shadow: var(--neu-flat);
      letter-spacing: 0.05em;
      transition: box-shadow 0.15s;
    }
    .add-btn:active { box-shadow: var(--neu-pressed); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      margin: 0 28px 20px;
      border-radius: 50px;
      background: var(--bg);
      box-shadow: var(--neu-pressed);
      padding: 5px;
      gap: 4px;
    }

    .tabs button {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: transparent;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-radius: 50px;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }
    .tabs button.active { background: var(--bg); color: var(--accent); box-shadow: var(--neu-flat); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Ledger ── */
    .list-section { padding: 0 28px 28px; }

    .section-title {
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      padding-left: 4px;
    }

    .no-data { text-align: center; color: var(--muted); padding: 48px 0; font-size: 0.85rem; }

    .entry {
      display: flex;
      align-items: center;
      background: var(--bg);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: var(--neu-flat);
      transition: box-shadow 0.15s;
    }
    .entry:hover { box-shadow: var(--neu-raised); }

    .entry .date-badge { width: 40px; text-align: center; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 700; color: var(--muted); flex-shrink: 0; }
    .entry .cat-badge  { border-radius: 50px; padding: 3px 10px; font-size: 0.67rem; font-weight: 600; margin: 0 10px; flex-shrink: 0; white-space: nowrap; background: var(--bg); color: var(--text2); box-shadow: var(--neu-pressed); }
    .entry .desc       { flex: 1; font-size: 0.87rem; color: var(--text); }
    .entry .amount     { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.95rem; flex-shrink: 0; margin-left: 10px; }
    .entry .amount.income  { color: var(--green-d); }
    .entry .amount.expense { color: var(--red-d); }

    .entry .del-btn {
      background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.78rem;
      margin-left: 8px; width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--neu-flat); transition: color 0.2s, box-shadow 0.15s;
    }
    .entry .del-btn:hover { color: var(--red-d); box-shadow: var(--neu-pressed); }

    /* ── Stat ── */
    .stat-section { padding: 0 28px 28px; }

    .stat-card {
      background: var(--bg);
      border-radius: 20px;
      box-shadow: var(--neu-raised);
      padding: 20px;
      margin-bottom: 20px;
    }

    .chart-legend { display: flex; gap: 16px; margin-bottom: 14px; font-size: 0.68rem; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
    .legend-dot   { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }

    .bar-row     { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-label   { width: 52px; font-size: 0.72rem; color: var(--muted); text-align: right; flex-shrink: 0; font-weight: 600; }
    .bar-wrap    { flex: 1; background: var(--bg); border-radius: 50px; height: 10px; overflow: hidden; box-shadow: var(--neu-pressed); }
    .bar-fill    { height: 100%; border-radius: 50px; transition: width 0.5s ease; }
    .bar-fill.income  { background: linear-gradient(90deg, #68d391, #48bb78); }
    .bar-fill.expense { background: linear-gradient(90deg, #fc8181, #f56565); }
    .bar-val     { width: 96px; font-size: 0.7rem; color: var(--text2); text-align: right; flex-shrink: 0; font-weight: 600; }

    .stat-table   { width: 100%; border-collapse: collapse; }
    .stat-table th { font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); padding: 8px 10px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--shadow-dark); }
    .stat-table td { padding: 10px; font-size: 0.82rem; color: var(--text2); border-bottom: 1px solid rgba(163,177,198,0.3); }
    .stat-table tr:last-child td { border-bottom: none; }
    .stat-table .num { text-align: right; font-family: 'Nunito', sans-serif; font-weight: 700; }
    .stat-table .income-txt  { color: var(--green-d); }
    .stat-table .expense-txt { color: var(--red-d); }
    .stat-table .balance-txt { color: var(--accent-d); }

    .cat-stat-row   { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .cat-stat-label { width: 48px; font-size: 0.75rem; color: var(--text2); flex-shrink: 0; font-weight: 500; }
    .cat-bar-wrap   { flex: 1; background: var(--bg); border-radius: 50px; height: 8px; overflow: hidden; box-shadow: var(--neu-pressed); }
    .cat-bar-fill   { height: 100%; border-radius: 50px; background: linear-gradient(90deg, #fc8181, #f56565); }
    .cat-stat-val   { width: 82px; font-size: 0.72rem; color: var(--red-d); text-align: right; flex-shrink: 0; font-weight: 700; font-family: 'Nunito', sans-serif; }
    .cat-stat-pct   { width: 34px; font-size: 0.68rem; color: var(--muted); text-align: right; flex-shrink: 0; }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    가계부
    <span>Personal Finance</span>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <span id="month-label"></span>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>
</header>

<div class="summary">
  <div class="card income">
    <div class="card-icon">💚</div>
    <div class="label">수입</div>
    <div class="amount" id="total-income">0원</div>
  </div>
  <div class="card expense">
    <div class="card-icon">❤️</div>
    <div class="label">지출</div>
    <div class="amount" id="total-expense">0원</div>
  </div>
  <div class="card balance">
    <div class="card-icon">💜</div>
    <div class="label">잔액</div>
    <div class="amount" id="total-balance">0원</div>
  </div>
</div>

<div class="add-form">
  <div class="type-toggle">
    <button id="btn-income" class="active-income" onclick="setType('income')">수입</button>
    <button id="btn-expense" onclick="setType('expense')">지출</button>
  </div>
  <input type="date" name="date" id="input-date" class="neu-input">
  <input type="text" name="desc" id="input-desc" placeholder="내용" class="neu-input">
  <select id="input-cat" class="neu-input"></select>
  <input type="number" name="amount" id="input-amount" placeholder="금액" min="0" class="neu-input">
  <button class="add-btn" onclick="addEntry()">+ 추가</button>
</div>

<div class="tabs">
  <button class="active" onclick="switchTab('ledger', this)">내역</button>
  <button onclick="switchTab('daily', this)">일별 통계</button>
  <button onclick="switchTab('monthly', this)">월별 통계</button>
</div>

<div id="tab-ledger" class="tab-panel active">
  <div class="list-section">
    <div class="section-title" id="list-title"></div>
    <div id="entry-list"></div>
  </div>
</div>

<div id="tab-daily" class="tab-panel">
  <div class="stat-section">
    <div class="stat-card">
      <div class="section-title" id="daily-title"></div>
      <div class="chart-legend">
        <span><span class="legend-dot" style="background:#48bb78"></span>수입</span>
        <span><span class="legend-dot" style="background:#fc8181"></span>지출</span>
      </div>
      <div id="daily-chart"></div>
    </div>
    <div class="stat-card">
      <div class="section-title">일별 내역</div>
      <table class="stat-table">
        <thead><tr><th>날짜</th><th class="num">수입</th><th class="num">지출</th><th class="num">잔액</th></tr></thead>
        <tbody id="daily-tbody"></tbody>
      </table>
    </div>
    <div class="stat-card">
      <div class="section-title">지출 카테고리</div>
      <div id="cat-chart"></div>
    </div>
  </div>
</div>

<div id="tab-monthly" class="tab-panel">
  <div class="stat-section">
    <div class="stat-card">
      <div class="section-title">최근 12개월</div>
      <div class="chart-legend">
        <span><span class="legend-dot" style="background:#48bb78"></span>수입</span>
        <span><span class="legend-dot" style="background:#fc8181"></span>지출</span>
      </div>
      <div id="monthly-chart"></div>
    </div>
    <div class="stat-card">
      <div class="section-title">월별 내역</div>
      <table class="stat-table">
        <thead><tr><th>월</th><th class="num">수입</th><th class="num">지출</th><th class="num">잔액</th></tr></thead>
        <tbody id="monthly-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  let currentYear = new Date().getFullYear();
  let currentMonth = new Date().getMonth() + 1;
  let currentType = 'income';
  let currentTab = 'ledger';
  let entries = JSON.parse(localStorage.getItem('kakeibo') || '[]');

  const incomeCategories  = ['급여', '용돈', '기타'];
  const expenseCategories = ['식비', '교통', '쇼핑', '의료', '문화', '기타'];

  function setType(type) {
    currentType = type;
    document.getElementById('btn-income').className  = type === 'income'  ? 'active-income'  : '';
    document.getElementById('btn-expense').className = type === 'expense' ? 'active-expense' : '';
    const cats = type === 'income' ? incomeCategories : expenseCategories;
    document.getElementById('input-cat').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
  }

  function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    btn.classList.add('active');
    render();
  }

  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
    render();
  }

  function fmt(n) { return n.toLocaleString('ko-KR') + '원'; }
  function pad(n) { return String(n).padStart(2, '0'); }

  function addEntry() {
    const date   = document.getElementById('input-date').value;
    const desc   = document.getElementById('input-desc').value.trim();
    const cat    = document.getElementById('input-cat').value;
    const amount = parseInt(document.getElementById('input-amount').value);
    if (!date || !desc || !amount || amount <= 0) { alert('날짜, 내용, 금액을 모두 입력해주세요.'); return; }
    entries.push({ id: Date.now(), date, desc, cat, amount, type: currentType });
    localStorage.setItem('kakeibo', JSON.stringify(entries));
    document.getElementById('input-desc').value = '';
    document.getElementById('input-amount').value = '';
    render();
  }

  function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    localStorage.setItem('kakeibo', JSON.stringify(entries));
    render();
  }

  function getMonthly(y, m) { return entries.filter(e => e.date.startsWith(`${y}-${pad(m)}`)); }
  function sumType(arr, type) { return arr.filter(e => e.type === type).reduce((s, e) => s + e.amount, 0); }

  function renderSummary(monthly) {
    const income = sumType(monthly, 'income'), expense = sumType(monthly, 'expense');
    document.getElementById('total-income').textContent  = fmt(income);
    document.getElementById('total-expense').textContent = fmt(expense);
    document.getElementById('total-balance').textContent = fmt(income - expense);
  }

  function renderLedger(monthly) {
    document.getElementById('list-title').textContent = `${currentMonth}월 거래 내역`;
    const list = document.getElementById('entry-list');
    if (monthly.length === 0) { list.innerHTML = '<div class="no-data">이번 달 거래 내역이 없습니다.</div>'; return; }
    const byDay = {};
    for (const e of monthly) { if (!byDay[e.date]) byDay[e.date] = []; byDay[e.date].push(e); }
    const days = Object.keys(byDay).sort((a, b) => b.localeCompare(a));
    list.innerHTML = days.map(day => {
      const dayNum = parseInt(day.split('-')[2]);
      return byDay[day].map(e => `
        <div class="entry">
          <div class="date-badge">${dayNum}</div>
          <div class="cat-badge">${e.cat}</div>
          <div class="desc">${e.desc}</div>
          <div class="amount ${e.type}">${e.type === 'income' ? '+' : '−'}${fmt(e.amount)}</div>
          <button class="del-btn" onclick="deleteEntry(${e.id})">✕</button>
        </div>`).join('');
    }).join('');
  }

  function renderDaily(monthly) {
    document.getElementById('daily-title').textContent = `${currentMonth}월 일별 수입 · 지출`;
    const byDay = {};
    for (const e of monthly) { if (!byDay[e.date]) byDay[e.date] = {income:0,expense:0}; byDay[e.date][e.type] += e.amount; }
    const days = Object.keys(byDay).sort();
    if (days.length === 0) {
      document.getElementById('daily-chart').innerHTML = '<div class="no-data">데이터가 없습니다.</div>';
      document.getElementById('daily-tbody').innerHTML = '';
      document.getElementById('cat-chart').innerHTML = ''; return;
    }
    const maxVal = Math.max(...days.map(d => Math.max(byDay[d].income, byDay[d].expense)), 1);
    document.getElementById('daily-chart').innerHTML = days.map(day => {
      const dn = parseInt(day.split('-')[2]), d = byDay[day];
      return `<div class="bar-row">
        <div class="bar-label">${dn}일</div>
        <div style="flex:1;display:flex;flex-direction:column;gap:5px">
          <div class="bar-wrap"><div class="bar-fill income"  style="width:${Math.round(d.income/maxVal*100)}%"></div></div>
          <div class="bar-wrap"><div class="bar-fill expense" style="width:${Math.round(d.expense/maxVal*100)}%"></div></div>
        </div>
        <div class="bar-val" style="line-height:1.8;font-size:0.68rem">+${d.income.toLocaleString()}<br>−${d.expense.toLocaleString()}</div>
      </div>`;
    }).join('');
    let bal = 0;
    document.getElementById('daily-tbody').innerHTML = days.map(day => {
      const dn = parseInt(day.split('-')[2]), d = byDay[day]; bal += d.income - d.expense;
      return `<tr><td>${dn}일</td><td class="num income-txt">${d.income>0?'+'+fmt(d.income):'—'}</td><td class="num expense-txt">${d.expense>0?'−'+fmt(d.expense):'—'}</td><td class="num ${bal>=0?'balance-txt':'expense-txt'}">${fmt(bal)}</td></tr>`;
    }).join('');
    const catTotals = {};
    for (const e of monthly.filter(e => e.type==='expense')) catTotals[e.cat] = (catTotals[e.cat]||0) + e.amount;
    const totalExp = Object.values(catTotals).reduce((s,v)=>s+v,0);
    const cats = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
    document.getElementById('cat-chart').innerHTML = cats.length === 0
      ? '<div class="no-data" style="padding:16px 0">지출 내역이 없습니다.</div>'
      : cats.map(([cat,val]) => {
          const pct = totalExp>0?Math.round(val/totalExp*100):0;
          return `<div class="cat-stat-row"><div class="cat-stat-label">${cat}</div><div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:${pct}%"></div></div><div class="cat-stat-val">−${fmt(val)}</div><div class="cat-stat-pct">${pct}%</div></div>`;
        }).join('');
  }

  function renderMonthly() {
    const months = []; let y = currentYear, m = currentMonth;
    for (let i=0;i<12;i++) { months.unshift({y,m}); m--; if(m<1){m=12;y--;} }
    const data = months.map(({y,m}) => {
      const arr = getMonthly(y,m);
      return {label:`${String(y).slice(2)}/${pad(m)}`, income:sumType(arr,'income'), expense:sumType(arr,'expense')};
    });
    const maxVal = Math.max(...data.map(d=>Math.max(d.income,d.expense)),1);
    document.getElementById('monthly-chart').innerHTML = data.map(d => `
      <div class="bar-row">
        <div class="bar-label" style="width:58px">${d.label}</div>
        <div style="flex:1;display:flex;flex-direction:column;gap:5px">
          <div class="bar-wrap"><div class="bar-fill income"  style="width:${Math.round(d.income/maxVal*100)}%"></div></div>
          <div class="bar-wrap"><div class="bar-fill expense" style="width:${Math.round(d.expense/maxVal*100)}%"></div></div>
        </div>
        <div class="bar-val" style="line-height:1.8;font-size:0.68rem">+${d.income.toLocaleString()}<br>−${d.expense.toLocaleString()}</div>
      </div>`).join('');
    document.getElementById('monthly-tbody').innerHTML = data.map(d => {
      const bal=d.income-d.expense;
      return `<tr><td>${d.label}</td><td class="num income-txt">${d.income>0?'+'+fmt(d.income):'—'}</td><td class="num expense-txt">${d.expense>0?'−'+fmt(d.expense):'—'}</td><td class="num ${bal>=0?'balance-txt':'expense-txt'}">${fmt(bal)}</td></tr>`;
    }).join('');
  }

  function render() {
    document.getElementById('month-label').textContent = `${currentYear}년 ${currentMonth}월`;
    const monthly = getMonthly(currentYear, currentMonth);
    monthly.sort((a,b) => b.date.localeCompare(a.date));
    renderSummary(monthly);
    if      (currentTab==='ledger')  renderLedger(monthly);
    else if (currentTab==='daily')   renderDaily(monthly);
    else if (currentTab==='monthly') renderMonthly();
  }

  const today = new Date();
  document.getElementById('input-date').value = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
  setType('income');
  render();
</script>
</body>
</html>
